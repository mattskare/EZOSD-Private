name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            Write-Error "Invalid version format in VERSION file: '$version'. Expected semantic versioning (e.g. 1.0.0)"
            exit 1
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "VERSION file: $version"

      - name: Check if version is new
        id: release_check
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "v$version"
          $existingTag = git tag --list $tag
          if ($existingTag) {
            Write-Host "Tag $tag already exists. Skipping release."
            echo "should_release=false" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "Tag $tag does not exist. A release will be created."
            echo "should_release=true" >> $env:GITHUB_OUTPUT
          }
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Check version consistency
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $searchString = "\*\*Version\*\*:\s*$version|Version:? ?$version"
          $filesToCheck = @("Deploy-Windows.ps1", "build/Create-BootableUSB.ps1", "docs/ARCHITECTURE.md")
          foreach ($file in $filesToCheck) {
            if (Select-String -Path $file -Pattern $searchString) {
              Write-Host "✓ Version string found in $file"
            } else {
              Write-Error "Version string not found in $file. Please ensure it is updated to match the VERSION file."
              exit 1
            }
          }

      - name: Run Build script
        shell: pwsh
        run: |
          cd build
          .\Build-Standalone.ps1 -OutputPath "..\EZOSD.ps1"

      - name: Verify output
        shell: pwsh
        run: |
          if (Test-Path "EZOSD.ps1") {
            $size = [math]::Round((Get-Item "EZOSD.ps1").Length / 1KB, 1)
            Write-Host "✓ Standalone script created successfully ($size KB)"
          } else {
            Write-Error "Build failed - output file not found"
            exit 1
          }

      - name: Create release tag
        if: steps.release_check.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.release_check.outputs.tag }}
          git push origin ${{ steps.release_check.outputs.tag }}

      - name: Create Prerelease
        if: steps.release_check.outputs.should_release == 'true'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.release_check.outputs.tag }}"

          $body = @"
          # EZOSD - Enterprise Zero-Touch Operating System Deployment

          ## Version $version

          ### What's Included

          - **EZOSD.ps1**: Complete standalone deployment script with all modules embedded
          - **SetupComplete.ps1**: Post-deployment configuration script

          ### Usage

          1. Download ``EZOSD.ps1``
          2. Boot into WinPE environment
          3. Run the script:
             ``````powershell
             .\EZOSD.ps1
             ``````

          ### Requirements

          - WinPE environment
          - PowerShell 5.1+
          - DISM module
          - Internet connection for downloading Windows ESD and drivers

          For detailed documentation, see the [README](https://github.com/${{ github.repository }}/blob/main/README.md).
          "@

          gh release create $tag EZOSD.ps1 build/SetupComplete.ps1 config/*.json --title "Pre-release $tag" --notes $body --prerelease
